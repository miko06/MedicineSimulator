services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-54329}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-superuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-superpassword}
      POSTGRES_DB: ${POSTGRES_DB:-medsim}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-superuser}"]
      interval: 5s
      timeout: 5s
      retries: 5

  test-postgres:
    image: postgres:16-alpine
    restart: "no"
    ports:
      - "${POSTGRES_TEST_PORT:-54330}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-superuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-superpassword}
      POSTGRES_DB: ${POSTGRES_DB:-medsim}_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-superuser}"]
      interval: 3s
      timeout: 3s
      retries: 3

volumes:
  pgdata:
