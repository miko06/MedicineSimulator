name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: superuser
          POSTGRES_PASSWORD: superpassword
          POSTGRES_DB: medsim_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: backend
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: backend
        run: bunx prisma generate

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: "postgresql://superuser:superpassword@localhost:5432/medsim_test?schema=public"
        run: bunx prisma migrate deploy

      - name: Typecheck
        working-directory: backend
        run: bun run typecheck

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: "postgresql://superuser:superpassword@localhost:5432/medsim_test?schema=public"
          JWT_SECRET: "test-ci-secret-at-least-32-characters-long"
        run: bun test
