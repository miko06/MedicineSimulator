services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: "8080"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-superuser}:${POSTGRES_PASSWORD:-superpassword}@postgres:5432/${POSTGRES_DB:-medsim}?schema=public"
      JWT_SECRET: "${JWT_SECRET}"
      CORS_ORIGINS: "${CORS_ORIGINS:-*}"
      COOKIE_SECURE: "true"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-superuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-superpassword}
      POSTGRES_DB: ${POSTGRES_DB:-medsim}
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-superuser}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: bunx prisma migrate deploy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-superuser}:${POSTGRES_PASSWORD:-superpassword}@postgres:5432/${POSTGRES_DB:-medsim}?schema=public"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata-prod:
